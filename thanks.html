<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Děkujeme</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .skip-link {
        position: absolute;
        left: 0.75rem;
        top: 0.75rem;
        z-index: 20;
        transform: translateY(-180%);
        border-radius: 0.5rem;
        background: #f8fafc;
        color: #0f172a;
        padding: 0.6rem 0.9rem;
        font-weight: 700;
        transition: transform 0.2s ease;
      }
      .skip-link:focus {
        transform: translateY(0);
      }
      a:focus-visible {
        outline: 3px solid #f8fafc;
        outline-offset: 3px;
      }
    </style>
</head>

<body class="min-h-screen bg-[#192530] text-slate-100 flex items-center justify-center">
    <a class="skip-link" href="#thanks-main">Preskočit na obsah</a>

    <main id="thanks-main" class="relative w-full px-4">

        <div class="relative z-10 mx-auto max-w-2xl text-center">

            <h1 class="font-['Anton'] uppercase tracking-wide">
                <span class="block text-[14vw] sm:text-7xl text-zinc-100">
                    Thanks
                </span>
            </h1>

            <div class="mt-10 rounded-2xl border border-white/10 bg-slate-900/60 p-8 backdrop-blur">
                
                <p class="text-slate-300 text-lg">
                    Thanks for your message. We’ll get back to you as soon as possible.
                </p>

                <a href="index.html"
                   class="mt-8 inline-block rounded-xl bg-white px-8 py-4 font-bold text-slate-900 transition 
                          hover:bg-cyan-400 hover:scale-[1.03] active:scale-95">
                    Back to site
                </a>

            </div>

        </div>

    </main>

</body>
</html>
